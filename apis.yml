modified: '2026-04-19'
description: >-
  AGL Resources was an energy services holding company headquartered in Atlanta,
  Georgia, whose principal business was the distribution of natural gas to
  residential, commercial, and industrial customers. In 2016, AGL Resources was
  acquired by Southern Company and renamed Southern Company Gas, becoming the
  nation's largest natural gas-only distribution company. The company distributes
  natural gas through subsidiaries including Atlanta Gas Light, Chattanooga Gas,
  Nicor Gas, and Virginia Natural Gas. AGL Resources / Southern Company Gas does
  not offer a public developer API; utility data access is available through
  third-party data aggregators and community-built integrations.
